<html>
    <head>
        <title>TURISMO PERÚ</title>
        <style>
            *{
                padding: 0px;
                margin: 0px;
            }
            .contenedor{
                width: 800px;
                height: 300px;
                border: 1px solid black;
                margin: 0 auto;
                position: relative;
                overflow: hidden;
            }/* hasta aqui preparar para todas las clases */

            .tarjeta1, .tarjeta2, .tarjeta3, .tarjeta4{
                width: 200px;
                top: -300px;
                height: 300px;
                position: absolute;
                background-size: cover;
            }
            .tarjeta1{
                left: 0px;
                background-image: url(img/mar.jpg);
                animation: tarjeta1 3s 1 forwards;
            }
            .tarjeta2{
                left: 200px;
                background-image: url(img/costa.jpg);
                animation: tarjeta1 3s 1 forwards 3s;
            }
            .tarjeta3{
                left: 400px;
                background-image: url(img/sierra.jpg);
                animation: tarjeta1 3s 1 forwards 6s;
            }
            .tarjeta4{
                left: 600px;
                background-image: url(img/selva.jpg);
                animation: tarjeta1 3s 1 forwards 9s;
            }
            /* LAS RICAS ANIMACIONES */
            @keyframes tarjeta1 {
                0%{
                    top: -300px;
                    transform: rotateY(180deg);
                }
                50%{
                    top: 300px;
                }
                100%{
                    top: 0px;
                }
            }
            
            /* EVENTOS */
            .tarjeta1:hover{
                transition: 1s;
                scale: 1.2;
                z-index: 1;
            }
            .tarjeta2:hover{
                transition: 1s;
                scale: 1.2;
                z-index: 1;
            }
            .tarjeta3:hover{
                transition: 1s;
                scale: 1.2;
                z-index: 1;
            }
            .tarjeta4:hover{
                transition: 1s;
                scale: 1.2;
                z-index: 1;
            }
            .texto{
                width: 100%;
                height: 40px;
                top: -300px;
                padding: 20px;
                position: absolute;
                background-color: rgba(83, 75, 75, 0.493);
                animation: texto 3s 1 forwards 12s;
                text-align: center;
                color: blanchedalmond;
                z-index: 2;
            }
            @keyframes texto {
                0%{
                    top: -300px;
                }
                50%{
                    top: 300px;
                }
                100%{
                    top: 200px;
                }
            }
            .texto:hover{
                transition: 1s;
                scale: 1;
                background-color: aliceblue;
                color: black;
            }
        </style>
    </head>
    <body>
        <div class="contenedor">
            <div class="tarjeta1"></div>
            <div class="tarjeta2"></div>
            <div class="tarjeta3"></div>
            <div class="tarjeta4"></div>
            <div class="texto"><h1>LUGARES TURÍSTICOS</h1></div>
        </div>
    </body>
</html>
